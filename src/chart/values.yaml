registry: ghcr.io

namespace: ml-clin-deid

# Image pull secret
# privateRegistry: acr-auth
tag: gha47-linux-amd64

# supported types are nginx (wip: traefik and istio)
ingress:
  enabled: false
  class: nginx

# For any of the services below, a service mesh like Linkerd or Istio
# is needed to properly balance traffic to more than 1 replica.
# https://github.com/microsoft/presidio/issues/304

analyzer:
  name: sdsc-ordes/deid-module/presidio-analyzer
  replicas: 1
  imagePullPolicy: Always
  # analyzerConfigMapName: ""
  # defaultConfigMapName: ""
  # recognizersConfigMapName: ""
  container:
    resources:
      requests:
        memory: "1500Mi"
        cpu: "1500m"
      limits:
        memory: "3000Mi"
        cpu: "2000m"
  service:
    type: ClusterIP
    externalPort: 80
    internalPort: 8080
    name: http

anonymizer:
  name: sdsc-ordes/deid-module/presidio-anonymizer
  replicas: 1
  imagePullPolicy: Always
  container:
    resources:
      requests:
        memory: "128Mi"
        cpu: "125m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  service:
    type: ClusterIP
    externalPort: 80
    internalPort: 8080
    name: http

surrogate:
  name: sdsc-ordes/deid-module/surrogate
  replicas: 1
  imagePullPolicy: Always
  mapStorage: 1Gi
  container:
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "1Gi"
        cpu: "500m"
  service:
    type: ClusterIP
    externalPort: 1010
    internalPort: 80
    name: http
