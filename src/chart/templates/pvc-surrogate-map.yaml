{{ $fullname := include "surrogate.fullname" . }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $fullname }}-map
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ $fullname }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.surrogate.mapStorage }}
